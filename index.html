<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>more-cup | liquid platform game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="world" aria-label="Liquid game canvas"></canvas>
  <canvas id="fluid-overlay" aria-hidden="true"></canvas>

  <section class="hud" aria-live="polite">
    <h1>more-cup</h1>
    <p>Hold anywhere to pour liquid. Drag the cup; tilt with arrow keys.</p>
    <p class="meta" id="stats">drops: 0</p>
  </section>

  <aside class="controls-panel" id="controls-panel" aria-label="Water controls">
    <h2>water lab</h2>
    <div class="controls-list" id="controls-list"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
